# Production baseline. For development, overlay docker-compose.dev.yml:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# or simply: make dev-up

# Backend environment variables
x-backend-variables: &backend-variables
  WAIT_HOSTS: capagg-db:5432,capagg-pgbouncer:5432,capagg-redis:6379,capagg-mosquitto:1883
  WAIT_TIMEOUT: ${WAIT_TIMEOUT:-120}
  DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-capaggregator.config.settings.production}
  SECRET_KEY: ${SECRET_KEY:?}
  DEBUG: ${DEBUG:-False}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
  WAGTAILADMIN_BASE_URL: ${WAGTAILADMIN_BASE_URL:-http://localhost:8000}

  # Database — app connects through PgBouncer; postgis:// scheme selects the
  # PostGIS engine via dj-database-url
  DATABASE_URL: postgis://${DB_USER:-capagg}:${DB_PASSWORD:?}@capagg-pgbouncer:5432/${DB_NAME:-capagg}
  DB_CONNECTION_MAX_AGE: ${DB_CONNECTION_MAX_AGE:-0}
  DB_CONN_HEALTH_CHECKS: ${DB_CONN_HEALTH_CHECKS:-False}
  # True by default: PgBouncer runs in transaction pool mode, where server-side
  # cursors don't survive across transactions
  DB_DISABLE_SERVER_SIDE_CURSORS: ${DB_DISABLE_SERVER_SIDE_CURSORS:-True}
  DB_SSL_REQUIRE: ${DB_SSL_REQUIRE:-False}

  # Redis / Celery
  REDIS_URL: redis://capagg-redis:6379/0
  CAPAGG_CELERY_DEFAULT_WORKER_CONCURRENCY: ${CAPAGG_CELERY_DEFAULT_WORKER_CONCURRENCY:-2}
  CAPAGG_CELERY_INGESTION_WORKER_CONCURRENCY: ${CAPAGG_CELERY_INGESTION_WORKER_CONCURRENCY:-2}
  CAPAGG_CELERY_WORKER_LOG_LEVEL: ${CAPAGG_CELERY_WORKER_LOG_LEVEL:-INFO}

  # MQTT (internal broker service)
  MQTT_HOST: capagg-mosquitto
  MQTT_PORT: 1883
  MQTT_CONSUMER_USERNAME: ${MQTT_CONSUMER_USERNAME:-capagg-consumer}
  MQTT_CONSUMER_PASSWORD: ${MQTT_CONSUMER_PASSWORD:?}
  MQTT_IN_TOPIC: ${MQTT_IN_TOPIC:-cap/in/#}

  # Secrets / crypto
  CAPAGG_SECRET_KEY: ${CAPAGG_SECRET_KEY:?}

  # Mosquitto auth files (shared mount; broker self-reloads on change)
  MOSQUITTO_AUTH_DIR: /mosquitto-config
  MOSQUITTO_UID: ${MOSQUITTO_UID:-1883}

  # Static/media (collected into shared mounts served by nginx)
  STATIC_ROOT: /app/staticfiles
  MEDIA_ROOT: /app/media

  # Gunicorn
  GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
  GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}

# Workers/beat/consumer additionally wait for the app itself — its port only
# opens after migrate + tile-function creation, so this guarantees the schema
# exists before they start (WAIT_HOSTS is TCP-only and can't check migrations)
x-worker-variables: &worker-variables
  <<: *backend-variables
  WAIT_HOSTS: capagg-db:5432,capagg-pgbouncer:5432,capagg-redis:6379,capagg-mosquitto:1883,capagg-app:8000

x-app-common: &app-common
  build: .
  environment:
    <<: *backend-variables
  volumes:
    - ./deploy/mosquitto:/mosquitto-config
    - ./docker-data/static:/app/staticfiles
    - ./docker-data/media:/app/media
  depends_on:
    capagg-db:
      condition: service_healthy
    capagg-pgbouncer:
      condition: service_healthy
    capagg-redis:
      condition: service_healthy
    capagg-mosquitto:
      condition: service_healthy
  restart: unless-stopped

services:
  capagg-db:
    image: imresamu/postgis:18-3.6
    environment:
      POSTGRES_DB: ${DB_NAME:-capagg}
      POSTGRES_USER: ${DB_USER:-capagg}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?}
    healthcheck:
      # -h $(hostname -i) forces a TCP check on the container's network
      # interface — plain `pg_isready` only tests the unix socket, which can
      # report healthy while TCP connections from other containers are refused
      test: [ "CMD-SHELL", "pg_isready -h $(hostname -i) -p 5432 -U ${DB_USER:-capagg} -d ${DB_NAME:-capagg}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s
    volumes:
      - ./docker-data/db:/var/lib/postgresql
    ports:
      - "5432"
    restart: unless-stopped

  capagg-pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    environment:
      DB_HOST: capagg-db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-capagg}
      DB_PASSWORD: ${DB_PASSWORD:?}
      DB_NAME: ${DB_NAME:-capagg}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 2000
      DEFAULT_POOL_SIZE: 16
      RESERVE_POOL_SIZE: 10
      SERVER_RESET_QUERY: "DISCARD ALL"
      IGNORE_STARTUP_PARAMETERS: "extra_float_digits"
      QUERY_WAIT_TIMEOUT: 60000
      SERVER_IDLE_TIMEOUT: 600
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${DB_USER:-capagg} -d ${DB_NAME:-capagg}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      capagg-db:
        condition: service_healthy
    restart: unless-stopped

  capagg-redis:
    image: redis:7-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  capagg-mosquitto:
    image: eclipse-mosquitto:2
    # Custom entrypoint: watches the auth files (rewritten automatically by the
    # app on SourceAuthority save) and SIGHUPs the broker when they change.
    entrypoint: [ "/bin/sh", "/mosquitto-entrypoint.sh" ]
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./deploy/mosquitto/entrypoint.sh:/mosquitto-entrypoint.sh:ro
      - ./deploy/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./deploy/mosquitto:/mosquitto/auth
      - ./docker-data/mosquitto:/mosquitto/data
    healthcheck:
      test: [ "CMD-SHELL", "nc -z $(hostname -i) 1883" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  capagg-app:
    <<: *app-common
    command: gunicorn
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  capagg-worker-default:
    <<: *app-common
    command: celery-default-worker
    environment: *worker-variables

  capagg-worker-ingestion:
    <<: *app-common
    command: celery-ingestion-worker
    environment: *worker-variables

  capagg-beat:
    <<: *app-common
    command: celery-beat
    environment: *worker-variables

  capagg-mqtt-consumer:
    <<: *app-common
    command: mqtt-consumer
    environment: *worker-variables

  capagg-martin:
    image: ghcr.io/maplibre/martin:1.5.0
    environment:
      DATABASE_URL: postgresql://${DB_USER:-capagg}:${DB_PASSWORD:?}@capagg-db:5432/${DB_NAME:-capagg}
    volumes:
      - ./deploy/martin/config.yaml:/config/config.yaml:ro
    command: --config /config/config.yaml
    # Martin reads its catalog (the capagg_alerts_tile function) once at startup,
    # so it must start only after the app has migrated and created the function
    depends_on:
      capagg-db:
        condition: service_healthy
      capagg-app:
        condition: service_healthy
    restart: unless-stopped

  capagg-web-proxy:
    image: nginx:1.27-alpine
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker-data/static:/static:ro
      - ./docker-data/media:/media:ro
    depends_on:
      - capagg-app
      - capagg-martin
    restart: unless-stopped
