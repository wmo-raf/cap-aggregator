proxy_cache_path /var/cache/nginx/tiles levels=1:2 keys_zone=tiles:50m max_size=2g
                 inactive=30m use_temp_path=off;

server {
    listen 80;
    server_name _;

    location /static/ {
        alias /static/;
        expires 7d;
    }

    location /media/ {
        alias /media/;
        expires 7d;
    }

    location / {
        proxy_pass http://capagg-app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vector tiles — cached because clients round `t` to 5-minute buckets
    location /martin/ {
        proxy_pass http://capagg-martin:3000;
        proxy_cache tiles;
        proxy_cache_key "$uri$is_args$args";
        proxy_cache_valid 200 204 5m;
        proxy_cache_use_stale error timeout updating;
        add_header X-Tile-Cache $upstream_cache_status;
    }
}
