# Mosquitto config for CAP aggregator
# Per-authority credentials live in /mosquitto/auth/passwd (mosquitto_passwd format)
# and topic permissions in /mosquitto/auth/acl. Both files are regenerated by the
# Django management command `sync_mosquitto`, then the broker is reloaded (SIGHUP).

listener 1883
protocol mqtt

persistence true
persistence_location /mosquitto/data/

allow_anonymous false
password_file /mosquitto/auth/passwd
acl_file /mosquitto/auth/acl

# QoS 1 in-flight tuning
max_inflight_messages 100
max_queued_messages 10000

log_dest stdout
log_type warning
log_type notice
