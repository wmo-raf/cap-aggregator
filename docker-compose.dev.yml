# Dev overlay — hot reload, source mounts, dev settings, exposed ports.
# Usage: make dev-up   (= docker compose -f docker-compose.yml -f docker-compose.dev.yml up)

x-dev-common: &dev-common
  build:
    context: .
    args:
      DEV: "true"
  environment:
    DEBUG: "True"
    DJANGO_SETTINGS_MODULE: capaggregator.config.settings.dev
  volumes:
    - ./src:/app/src
    - ./deploy/mosquitto:/mosquitto-config
    - ./docker-data/static:/app/staticfiles
    - ./docker-data/media:/app/media

services:
  capagg-app:
    <<: *dev-common
    command: django-dev
    ports:
      - "${APP_PORT:-8000}:8000"

  capagg-worker-default:
    <<: *dev-common
    command: celery-default-worker-dev

  capagg-worker-ingestion:
    <<: *dev-common
    command: celery-ingestion-worker-dev

  capagg-beat:
    <<: *dev-common
    command: celery-beat

  capagg-mqtt-consumer:
    <<: *dev-common
    command: mqtt-consumer

  capagg-martin:
    ports:
      - "${MARTIN_PORT:-3000}:3000"

  # Vite dev server (HMR) for the explorer SPA. Templates reference it via
  # django-vite dev_mode (dev settings default True); the browser reaches it
  # at localhost:5173, so the port mapping must match DJANGO_VITE settings.
  capagg-vite:
    image: node:22-alpine
    working_dir: /frontend
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/frontend
      # Tailwind's @source scans Django templates (../../../src/capaggregator
      # from main.css resolves to /src/capaggregator in this container)
      - ./src:/src:ro
      - capagg-vite-node-modules:/frontend/node_modules
    ports:
      - "${VITE_PORT:-5173}:5173"
    restart: unless-stopped

volumes:
  capagg-vite-node-modules:
