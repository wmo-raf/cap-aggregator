{% for info in infos %}
    <section lang="{{ info.language }}" class="flex flex-col gap-3 rounded-lg border border-border bg-card p-4">
        <div class="flex items-center justify-between gap-2">
            <h2 class="text-lg font-semibold">{{ info.headline|default:info.event }}</h2>
            {% if infos|length > 1 %}
                <span class="rounded-full border border-border bg-secondary px-2 py-0.5 text-xs font-medium uppercase text-secondary-foreground">{{ info.language }}</span>
            {% endif %}
        </div>
        {% if info.description %}
            <div>
                <h3 class="text-sm font-semibold text-muted-foreground">Description</h3>
                <p class="whitespace-pre-line text-sm">{{ info.description }}</p>
            </div>
        {% endif %}
        {% if info.instruction %}
            <div>
                <h3 class="text-sm font-semibold text-muted-foreground">Instruction</h3>
                <p class="whitespace-pre-line text-sm">{{ info.instruction }}</p>
            </div>
        {% endif %}
    </section>
{% endfor %}
