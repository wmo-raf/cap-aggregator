{% load static django_vite %}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="all">
    <title>Explorer — CAP Aggregator</title>
    <link rel="icon" type="image/png" href="{% static 'images/cap-agg-logo.png' %}">
    {# Apply the stored theme before first paint to avoid a light/dark flash. #}
    <script>
        (() => {
            const stored = localStorage.getItem('capagg-theme');
            const dark = stored === 'dark' ||
                (stored === null && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.documentElement.classList.toggle('dark', dark);
        })();
    </script>
    {% vite_hmr_client %}
    {% vite_asset 'src/main.ts' %}
</head>
<body>
<div id="capagg-explorer"></div>
<noscript>
    <p>The CAP Aggregator explorer requires JavaScript. See the <a href="/">homepage</a> for more about the service.</p>
</noscript>
</body>
</html>
